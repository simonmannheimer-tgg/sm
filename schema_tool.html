<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGG Delivery Schema — Implementation Guide</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080d17;--bg2:#0f1623;--bg3:#161f2e;
  --b:#1e2d42;--bh:#2d4a6e;
  --text:#e2e8f0;--muted:#64748b;--dim:#475569;
  --green:#16a34a;--green-bg:#052e16;
  --amber:#d97706;--amber-bg:#1c1507;
  --blue:#3b82f6;--blue-bg:#172554;
  --oos:#dc2626;--oos-bg:#450a0a;
  --rose:#be123c;--rose-bg:#4c0519;
  --purple:#7c3aed;--purple-bg:#2e1065;
  --teal:#0d9488;--teal-bg:#042f2e;
  --gray:#374151;--gray-bg:#111827;
  --token:#fbbf24;
  --mono:'IBM Plex Mono',monospace;
  --sans:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.5;min-height:100vh}
.hdr{padding:14px 24px;border-bottom:1px solid var(--b);background:var(--bg2);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.hdr-title{font-size:15px;font-weight:700;letter-spacing:-.2px}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:1px}
.tgg-badge{font-size:10px;font-weight:800;color:#fff;background:#0055A5;padding:3px 10px;border-radius:4px;margin-left:auto}
.legend{padding:9px 24px;background:var(--bg2);border-bottom:1px solid var(--b);display:flex;flex-wrap:wrap;gap:14px;align-items:center}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.leg-sep{width:1px;height:12px;background:var(--b);margin:0 2px}
.leg-hint{margin-left:auto;font-size:10px;color:var(--dim)}
.wrap{padding:18px 24px;overflow-x:auto}
table{border-collapse:separate;border-spacing:4px;min-width:1900px}
thead th{background:var(--bg3);border:1px solid var(--b);border-radius:5px;padding:8px 10px;font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;text-align:center;vertical-align:middle}
thead th.rh{text-align:left;min-width:145px}
tbody th{background:var(--bg3);border:1px solid var(--b);border-radius:5px;padding:0 14px;font-size:11px;font-weight:600;white-space:nowrap;text-align:left;vertical-align:middle;min-width:140px;height:56px}
td.cell{border-radius:6px;border:1px solid;padding:0;cursor:pointer;transition:transform .1s,box-shadow .15s;min-width:145px;height:64px;text-align:center;vertical-align:middle}
td.cell:hover{transform:translateY(-2px)}
td.cell.na{opacity:.2;cursor:default;background:var(--bg);border-color:var(--b)}
td.cell.na:hover{transform:none}
td.cell.active{outline:2px solid #fff;outline-offset:1px}
.cell-lbl{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.3px;line-height:1.4;padding:5px 7px}
.ci  {background:var(--green-bg);border-color:var(--green)}
.ci  .cell-lbl{color:var(--green)}
.ci:hover{box-shadow:0 4px 16px rgba(22,163,74,.3),0 0 0 1px var(--green)}
.cil {background:var(--amber-bg);border-color:var(--amber)}
.cil .cell-lbl{color:var(--amber)}
.cil:hover{box-shadow:0 4px 16px rgba(217,119,6,.3),0 0 0 1px var(--amber)}
.cp  {background:var(--blue-bg);border-color:var(--blue)}
.cp  .cell-lbl{color:var(--blue)}
.cp:hover{box-shadow:0 4px 16px rgba(59,130,246,.3),0 0 0 1px var(--blue)}
.co  {background:var(--oos-bg);border-color:var(--oos)}
.co  .cell-lbl{color:var(--oos)}
.co:hover{box-shadow:0 4px 16px rgba(220,38,38,.3),0 0 0 1px var(--oos)}
.cd  {background:var(--rose-bg);border-color:var(--rose)}
.cd  .cell-lbl{color:var(--rose)}
.cd:hover{box-shadow:0 4px 16px rgba(190,18,60,.3),0 0 0 1px var(--rose)}
.cis {background:var(--teal-bg);border-color:var(--teal)}
.cis .cell-lbl{color:var(--teal)}
.cis:hover{box-shadow:0 4px 16px rgba(13,148,136,.3),0 0 0 1px var(--teal)}
.cin {background:var(--purple-bg);border-color:var(--purple)}
.cin .cell-lbl{color:var(--purple)}
.cin:hover{box-shadow:0 4px 16px rgba(124,58,237,.3),0 0 0 1px var(--purple)}
.cx  {background:var(--gray-bg);border-color:var(--gray)}
.cx  .cell-lbl{color:var(--dim)}
.cx:hover{box-shadow:0 4px 16px rgba(55,65,81,.3),0 0 0 1px var(--gray)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;display:none;backdrop-filter:blur(2px)}
.overlay.open{display:flex;align-items:stretch;justify-content:flex-end}
.drawer{background:var(--bg2);border-left:1px solid var(--b);width:50vw;min-width:480px;max-width:900px;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.d-hdr{padding:16px 20px 12px;border-bottom:1px solid var(--b);position:sticky;top:0;background:var(--bg2);z-index:10}
.d-title{font-size:14px;font-weight:700;padding-right:34px;line-height:1.3}
.d-sub{font-size:10px;color:var(--muted);margin-top:3px;font-family:var(--mono)}
.d-close{position:absolute;top:14px;right:16px;background:var(--bg3);border:1px solid var(--b);color:var(--muted);width:26px;height:26px;border-radius:4px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.d-close:hover{color:var(--text);border-color:var(--bh)}
.d-body{padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.ds{background:var(--bg3);border:1px solid var(--b);border-radius:6px;overflow:hidden}
.ds-title{font-size:9.5px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;padding:7px 12px;border-bottom:1px solid var(--b)}
.df{display:grid;grid-template-columns:180px 1fr;border-bottom:1px solid var(--b);overflow:hidden}
.df:last-of-type{border-bottom:none}
.dk{font-size:10px;color:var(--dim);padding:8px 12px;font-family:var(--mono);border-right:1px solid var(--b);background:rgba(255,255,255,.015);display:flex;align-items:center}
.dv{font-size:11px;padding:8px 12px;font-family:var(--mono);word-break:break-word;display:flex;align-items:flex-start;flex-direction:column;gap:3px;min-width:0;overflow:hidden}
.dv.row{flex-direction:row;align-items:center;flex-wrap:wrap;gap:6px}
.dv.g{color:var(--green)}.dv.b{color:var(--blue)}.dv.r{color:var(--oos)}
.dv.p{color:var(--purple)}.dv.t{color:var(--teal)}.dv.ro{color:var(--rose)}
.dv.tk{color:var(--token)}.dv.mu{color:var(--muted)}.dv.am{color:var(--amber)}
.jw{background:#0d1520;border:1px solid var(--b);border-radius:6px;overflow:hidden}
.jl{padding:5px 12px;font-size:9.5px;font-weight:700;letter-spacing:.4px;border-bottom:1px solid var(--b);font-family:var(--sans)}
.jb{color:#c5d0dc;font-size:10.5px;line-height:1.75;padding:11px 0;margin:0;overflow-x:auto;white-space:pre;display:block;font-family:var(--mono)}
.jgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ex-label{font-family:var(--mono);font-size:9.5px;color:var(--dim);padding:2px 0 7px;line-height:1.7}
.sb{padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;white-space:nowrap}
.sb-s{background:#1e3a5f;color:#93c5fd}
.sb-c{background:#2e1065;color:#c4b5fd}
.sb-x{background:#052e16;color:#86efac}
.sb-r{background:#450a0a;color:#fca5a5}
.dpath{font-size:9px;color:var(--dim);font-family:var(--mono)}

/* Fill viewport — no size changes, just layout */
html,body{height:100%;margin:0;overflow:hidden}
body{display:flex;flex-direction:column}
.hd{flex-shrink:0}
.tab-bar{background:var(--bg2);border-bottom:1px solid var(--b);display:flex;flex-shrink:0;padding:0 20px;position:relative;z-index:40}
.tab-btn{background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);cursor:pointer;font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:.3px;margin-bottom:-1px;padding:11px 18px;transition:color .15s,border-color .15s}
.tab-btn.active{border-bottom-color:var(--blue);color:var(--text)}
.tab-btn:hover:not(.active){color:var(--text)}
.pane{display:none}
.pane.active{display:block;flex:1;overflow:auto;min-height:0}
.logo-img{height:28px;width:auto;object-fit:contain;display:block;filter:brightness(1.1)}

</style>
</head>

function hl(s){
  return s
    .split('\n')
    .map(line => {
      const tok = line.replace(/(\{\{[^}]+\}\})/g,'<span style="color:#fbbf24;font-weight:700">$1</span>');
      if(line.includes('REMOVED')){
        return '<span style="display:block;background:rgba(220,38,38,.18);border-left:3px solid #dc2626;padding:0 13px 0 10px;color:#fca5a5;font-weight:700">'+tok+'</span>';

      if(CHANGED_MARKERS.some(m=>line.includes(m))){
        return '<span style="display:block;background:rgba(217,119,6,.15);border-left:3px solid #d97706;padding:0 13px 0 10px">'+tok+'</span>';

      return '<span style="display:block;padding:0 13px">'+tok+'</span>';
    })
    .join('\n');

      {f:'tgg.product_life_cycle', v:'AGENCY-Miele-PL / AGENCY-Miele-BB', s:'s', p:'product.metafields.tgg.product_life_cycle'},
    ],
    fields:[
      {f:'offers block', v:'REMOVE entire offers block', vc:'mu', s:'r'},
    ],
    bef:BEF_OFFER,
  },
  on:{
    det:'not a public PDP',
    title:'ORDER NOW — UNCLASSIFIED',
    sub:'Cart-only product — not a public PDP',
    inputs:[
      {f:'tgg.purchase_state',     v:'ORDER NOW',    s:'s', p:'product.metafields.tgg.purchase_state'},
      {f:'tgg.product_life_cycle', v:'UNCLASSIFIED', s:'s', p:'product.metafields.tgg.product_life_cycle'},
    ],
    fields:[
      {f:'Product schema block', v:'REMOVE the Product <script type="application/ld+json"> block only — where @type is "Product". Other schema blocks on this page (FAQPage, BreadcrumbList) are not affected.', vc:'mu', s:'r'},
    ],
    bef:null,
  },
};

// ─── BUILD MATRIX ─────────────────────────────────────────────────────────────
function buildMatrix(){
  const tbl=document.getElementById('mtable');
  const thead=tbl.createTHead();
  const hr=thead.insertRow();
  const th0=document.createElement('th');
  th0.className='rh'; th0.textContent='Purchase State';
  hr.appendChild(th0);
  LC.forEach(lc=>{
    const th=document.createElement('th');
    th.textContent=lc;
    hr.appendChild(th);
  });
  const tbody=tbl.createTBody();
  PS.forEach((ps,ri)=>{
    const tr=tbody.insertRow();
    const th=document.createElement('th');
    th.textContent=ps; tr.appendChild(th);
    GRID[ri].forEach((sid,ci)=>{
      const td=tr.insertCell();
      if(!sid){td.className='cell na';return;}
      const cl=CL[SCEN_CL[sid]]||CL.cx;
      td.className='cell '+cl.cls;
      td.dataset.sid=sid;
      const scen=SCENS[sid];
      const inner=document.createElement('div');
      inner.className='cell-lbl';
      const det2=scen&&scen.det?'<br><span style="font-size:8px;opacity:.6;font-weight:400;letter-spacing:0;white-space:nowrap">'+scen.det+'</span>':'';
      inner.innerHTML=cl.lbl+det2;
      td.appendChild(inner);
    });
  });
}

// ─── DRAWER ───────────────────────────────────────────────────────────────────
function openDrawer(sid){
  const s=SCENS[sid]; if(!s) return;
  const cl=CL[SCEN_CL[sid]]||CL.cx;
  document.getElementById('d-title').textContent=s.title;
  document.getElementById('d-sub').textContent=s.sub||'';

  let h='';

  // Decision inputs
  h+=`<div class="ds"><div class="ds-title">Decision Inputs</div>`;
  s.inputs.forEach((inp,i)=>{
    h+=`<div class="df"><div class="dk">${inp.f}</div><div class="dv"><span style="color:#e2e8f0;font-weight:600">${inp.v}</span>${inp.p?`<span class="dpath" style="margin-top:1px">${inp.p}</span>`:''}</div></div>`;
  });
  h+=`</div>`;

  // Schema changes
  h+=`<div class="ds"><div class="ds-title">Schema Changes</div>`;
  s.fields.forEach(f=>{
    const cls={s:'sb-s',c:'sb-c',x:'sb-x',r:'sb-r'}[f.s]||'sb-x';
    const lbl={s:'Shopify',c:'Computed',x:'Fixed',r:'Remove'}[f.s]||f.s;
    h+=`<div class="df"><div class="dk">${f.f}</div><div class="dv row"><span class="${f.vc||''}">${f.v}</span>`;
    h+=`<span class="sb ${cls}">${lbl}</span>`;
    if(f.p) h+=`<span class="dpath">${f.p}</span>`;
    h+=`</div></div>`;
  });
  h+=`</div>`;

  // Before / after
  const afStr=AFTER[sid];
  if(s.bef && afStr){
    h+=`<div class="jgrid">`;
    h+=jblock(s.bef,'BEFORE','#1e2d42');
    h+=jblock(afStr,'AFTER','#052e16');
    h+=`</div>`;
  }

  document.getElementById('d-body').innerHTML=h;
  document.getElementById('overlay').classList.add('open');
}

function closeDrawer(){
  document.getElementById('overlay').classList.remove('open');
  document.querySelectorAll('td.cell.active').forEach(td=>td.classList.remove('active'));
}

document.addEventListener('DOMContentLoaded',function(){



  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click',function(){
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
      this.classList.add('active');
      document.getElementById('pane-'+this.dataset.tab).classList.add('active');
    });
  });

  buildMatrix();
  document.getElementById('mtable').addEventListener('click',function(e){
    const td=e.target.closest('td.cell:not(.na)');
    if(!td||!td.dataset.sid) return;
    document.querySelectorAll('td.cell.active').forEach(el=>el.classList.remove('active'));
    td.classList.add('active');
    openDrawer(td.dataset.sid);
  });
  document.getElementById('d-close').addEventListener('click',closeDrawer);
  document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this) closeDrawer();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape') closeDrawer();});
});
</script>
